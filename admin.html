<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Vocaris · Plattform-Verwaltung</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent:#4f46e5; --accent-2:#7c3aed; --accent-3:#ff6b5b; --accent-ink:#2b2580;
      --ink:#14161a; --ink-soft:#4a4f57; --ink-faint:#8b9098;
      --line:#e7e3da; --white:#fff; --paper:#faf9f6; --paper-2:#f4f2ee;
      --r:16px; --r-sm:10px; --shadow-sm:0 2px 10px rgba(20,22,26,.05);
      --shadow:0 18px 50px -18px rgba(40,36,90,.22);
      --font:'Inter',system-ui,sans-serif; --serif:'Instrument Serif',Georgia,serif;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--font); color:var(--ink); background:var(--paper-2); line-height:1.5; }
    a { color:var(--accent); text-decoration:none; }
    .hidden { display:none !important; }

    /* Login */
    .login { min-height:100vh; display:grid; place-items:center; padding:24px;
      background:linear-gradient(150deg,#4f46e5 0%,#7c3aed 56%,#5b21b6 100%); }
    .login__card { background:#fff; border-radius:24px; padding:40px 36px; width:100%; max-width:400px;
      box-shadow:0 40px 90px -30px rgba(40,36,90,.5); }
    .login__card h1 { font-family:var(--serif); font-weight:400; font-size:30px; margin-bottom:4px; }
    .login__card .sub { color:var(--ink-soft); font-size:14px; margin-bottom:26px; }
    label { display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin:14px 0 6px; }
    input, select { width:100%; font:inherit; font-size:15px; padding:12px 14px; border:1.5px solid var(--line);
      border-radius:var(--r-sm); background:#fff; color:var(--ink); }
    input:focus, select:focus { outline:none; border-color:var(--accent);
      box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 16%,transparent); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; font:inherit; font-weight:600;
      font-size:15px; padding:12px 20px; border-radius:100px; border:1px solid transparent; cursor:pointer;
      transition:transform .15s, box-shadow .15s; }
    .btn--primary { color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent-2)); }
    .btn--primary:hover { transform:translateY(-2px); box-shadow:0 16px 34px -10px rgba(79,70,229,.7); }
    .btn--ghost { color:var(--ink); background:#fff; border-color:var(--line); box-shadow:var(--shadow-sm); }
    .btn--ghost:hover { transform:translateY(-2px); border-color:#d6d1c5; }
    .btn--sm { padding:7px 14px; font-size:13px; }
    .btn--block { width:100%; }
    .err { color:var(--accent-3); font-size:13.5px; margin-top:12px; min-height:1.1em; font-weight:500; }

    /* App shell */
    .top { background:#fff; border-bottom:1px solid var(--line); padding:0 28px; height:64px;
      display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:10; }
    .top .brand { display:flex; align-items:center; gap:9px; font-weight:700; font-size:18px; letter-spacing:-.01em; }
    .top .brand .m { color:var(--accent); display:flex; }
    .top .pill { font-size:11.5px; font-weight:700; color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent-2));
      padding:3px 10px; border-radius:100px; letter-spacing:.02em; }
    .top .spacer { flex:1; }
    .top .who { color:var(--ink-faint); font-size:13px; }
    .wrap { max-width:1100px; margin:0 auto; padding:28px 24px 80px; }

    .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .between { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
    h2.title { font-family:var(--serif); font-weight:400; font-size:26px; margin-bottom:2px; }
    .muted { color:var(--ink-faint); font-size:13.5px; }

    .card { background:#fff; border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow-sm); }
    .tenant { padding:18px 20px; margin-bottom:14px; }
    .tenant__head { display:flex; align-items:flex-start; gap:12px; }
    .tenant__name { font-size:17px; font-weight:700; letter-spacing:-.01em; }
    .tenant__email { color:var(--ink-faint); font-size:13px; margin-top:2px; }
    .badge { font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:100px; white-space:nowrap; }
    .badge--rest { color:#8a3d17; background:#fdeee2; }
    .badge--gen { color:var(--accent-ink); background:color-mix(in srgb,var(--accent) 12%,#fff); }
    .tenant__stats { display:flex; gap:18px; margin-top:12px; flex-wrap:wrap; }
    .stat { font-size:13px; color:var(--ink-soft); }
    .stat b { color:var(--ink); font-weight:700; }
    .nums { margin-top:12px; display:flex; flex-direction:column; gap:6px; }
    .num { display:flex; align-items:center; gap:10px; font-size:14px; }
    .num code { background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:3px 9px; font-family:ui-monospace,monospace; }
    .num .dep { color:var(--ink-faint); font-size:12px; }
    .tenant__actions { margin-top:14px; padding-top:14px; border-top:1px solid var(--line); display:flex; gap:8px; flex-wrap:wrap; }

    dialog { border:none; border-radius:20px; padding:0; box-shadow:0 40px 90px -30px rgba(40,36,90,.5); max-width:440px; width:92%; }
    dialog::backdrop { background:rgba(20,18,50,.45); backdrop-filter:blur(2px); }
    .dlg { padding:28px; }
    .dlg h3 { font-family:var(--serif); font-weight:400; font-size:23px; margin-bottom:16px; }
    .dlg .foot { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }
    .radio { display:flex; gap:10px; margin-top:6px; }
    .radio label { flex:1; margin:0; padding:14px; border:1.5px solid var(--line); border-radius:12px; cursor:pointer;
      font-weight:600; color:var(--ink); transition:border-color .15s, background .15s; }
    .radio label.sel { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,#fff); }
    .radio .d { display:block; font-weight:400; font-size:12.5px; color:var(--ink-faint); margin-top:4px; }
    .radio input { display:none; }

    .toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); opacity:0;
      background:var(--ink); color:#fff; padding:12px 20px; border-radius:12px; font-size:14px; font-weight:500;
      pointer-events:none; transition:opacity .2s, transform .2s; z-index:50; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.err { background:var(--accent-3); }
    .empty { text-align:center; padding:60px 20px; color:var(--ink-faint); }
  </style>
</head>
<body>

  <!-- Login-Gate -->
  <div id="login" class="login">
    <div class="login__card">
      <div class="top__pill" style="margin-bottom:14px"><span class="pill">PLATTFORM</span></div>
      <h1>Vocaris-Verwaltung</h1>
      <p class="sub">Interner Bereich · nur für Plattform-Administratoren.</p>
      <form id="loginForm">
        <label>E-Mail</label>
        <input id="email" type="email" autocomplete="username" required />
        <label>Passwort</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <div class="err" id="loginErr"></div>
        <button class="btn btn--primary btn--block" style="margin-top:20px">Anmelden</button>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <div class="top">
      <div class="brand"><span class="m">◎</span> Vocaris <span class="pill">ADMIN</span></div>
      <div class="spacer"></div>
      <span class="who" id="who"></span>
      <button class="btn btn--ghost btn--sm" id="logout">Abmelden</button>
    </div>
    <div class="wrap">
      <div class="between" style="margin-bottom:20px">
        <div>
          <h2 class="title">Firmen</h2>
          <div class="muted" id="tenantCount">…</div>
        </div>
        <button class="btn btn--primary" id="newBtn">+ Neue Firma</button>
      </div>
      <div id="tenantList"></div>
    </div>
  </div>

  <!-- Dialog: Neue Firma -->
  <dialog id="newDlg">
    <div class="dlg">
      <h3>Neue Firma anlegen</h3>
      <form id="newForm">
        <label>Firmenname</label>
        <input id="nName" required placeholder="z. B. Trattoria da Vinci" />
        <label>Login-E-Mail des Kunden</label>
        <input id="nEmail" type="email" required placeholder="inhaber@restaurant.de" />
        <label>Start-Passwort</label>
        <input id="nPass" required minlength="8" placeholder="min. 8 Zeichen" />
        <label>Branche</label>
        <div class="radio" id="nIndustry">
          <label data-v="restaurant"><input type="radio" name="ind" value="restaurant" checked />Restaurant
            <span class="d">Mit Tischplan &amp; Reservierung</span></label>
          <label data-v="general"><input type="radio" name="ind" value="general" />Allgemein
            <span class="d">Nur Telefon-Assistent</span></label>
        </div>
        <div class="err" id="newErr"></div>
        <div class="foot">
          <button type="button" class="btn btn--ghost" id="newCancel">Abbrechen</button>
          <button type="submit" class="btn btn--primary" id="newSave">Firma anlegen</button>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Dialog: Nummer zuweisen -->
  <dialog id="numDlg">
    <div class="dlg">
      <h3>Telefonnummer zuweisen</h3>
      <p class="muted" id="numFor" style="margin-bottom:6px"></p>
      <form id="numForm">
        <label>Nummer (E.164)</label>
        <input id="numVal" required placeholder="+498941629762" />
        <label>Abteilung</label>
        <select id="numDep">
          <option value="general">Allgemein</option>
          <option value="vertrieb">Vertrieb</option>
          <option value="support">Support</option>
        </select>
        <div class="err" id="numErr"></div>
        <div class="foot">
          <button type="button" class="btn btn--ghost" id="numCancel">Abbrechen</button>
          <button type="submit" class="btn btn--primary">Zuweisen</button>
        </div>
      </form>
    </div>
  </dialog>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const sb = createClient(
      'https://nocsjyzmnskbyccrjayx.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vY3NqeXptbnNrYnljY3JqYXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDI4ODgsImV4cCI6MjA5NzI3ODg4OH0.RnIq-jbr6JKz_Z3etwc2rX1O6RXh5cidwm9mkRFrnw4');
    const API = 'https://ki-anruf.onrender.com';
    const $ = (id) => document.getElementById(id);
    let token = null;

    function toast(msg, kind = '') { const t = $('toast'); t.textContent = msg; t.className = 'toast show ' + kind; setTimeout(() => (t.className = 'toast'), 2800); }
    const auth = () => ({ 'content-type': 'application/json', authorization: 'Bearer ' + token });
    async function api(path, body) {
      const res = await fetch(API + path, { method: 'POST', headers: auth(), body: JSON.stringify(body || {}) });
      const d = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(d.error || 'Fehler');
      return d;
    }
    const esc = (s) => (s ?? '').replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

    // ---- Auth ----
    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('loginErr').textContent = '';
      const { data, error } = await sb.auth.signInWithPassword({ email: $('email').value.trim(), password: $('password').value });
      if (error) { $('loginErr').textContent = 'Anmeldung fehlgeschlagen.'; return; }
      await enter(data.session);
    });
    $('logout').onclick = async () => { await sb.auth.signOut(); location.reload(); };

    async function enter(session) {
      token = session?.access_token ?? null;
      if (!token) return showLogin();
      // Admin-Gate: Backend bestätigt, dass dieser Login Plattform-Admin ist.
      try {
        const res = await fetch(API + '/api/admin/me', { method: 'POST', headers: auth() });
        if (!res.ok) throw new Error();
      } catch {
        $('loginErr').textContent = 'Dieser Zugang ist kein Plattform-Administrator.';
        await sb.auth.signOut(); token = null; return showLogin();
      }
      $('who').textContent = session.user.email;
      $('login').classList.add('hidden');
      $('app').classList.remove('hidden');
      loadTenants();
    }
    function showLogin() { $('app').classList.add('hidden'); $('login').classList.remove('hidden'); }

    // ---- Firmenliste ----
    async function loadTenants() {
      const list = $('tenantList');
      list.innerHTML = '<div class="empty">Lade Firmen…</div>';
      try {
        const { tenants } = await api('/api/admin/tenants/list');
        $('tenantCount').textContent = tenants.length + (tenants.length === 1 ? ' Firma' : ' Firmen');
        if (!tenants.length) { list.innerHTML = '<div class="empty">Noch keine Firmen. Lege die erste an.</div>'; return; }
        list.innerHTML = tenants.map(tenantCard).join('');
        for (const t of tenants) wireTenant(t);
      } catch (e) { list.innerHTML = '<div class="empty">' + esc(e.message) + '</div>'; }
    }

    function tenantCard(t) {
      const badge = t.industry === 'restaurant'
        ? '<span class="badge badge--rest">🍽 Restaurant</span>'
        : '<span class="badge badge--gen">Allgemein</span>';
      const nums = t.numbers.length
        ? t.numbers.map((n) => `<div class="num"><code>${esc(n.phone_number)}</code>${n.department ? '<span class="dep">' + esc(n.department) + '</span>' : ''} <a href="#" data-unassign="${esc(n.phone_number)}" class="dep" style="margin-left:auto">entfernen</a></div>`).join('')
        : '<div class="muted">Keine Nummer zugewiesen</div>';
      const restHint = t.industry === 'restaurant' && !t.restaurantEnabled
        ? '<div class="muted" style="color:var(--accent-3);margin-top:6px">⚠ Reservierung ist in dieser Firma noch nicht aktiv</div>' : '';
      return `<div class="card tenant" data-id="${t.id}">
        <div class="tenant__head">
          <div style="flex:1">
            <div class="tenant__name">${esc(t.name)}</div>
            <div class="tenant__email">${t.ownerEmail ? esc(t.ownerEmail) : '<em>kein Login</em>'}</div>
          </div>
          ${badge}
        </div>
        <div class="tenant__stats">
          <span class="stat"><b>${t.calls30d}</b> Anrufe (30 T.)</span>
          <span class="stat"><b>${t.numbers.length}</b> Nummer(n)</span>
        </div>
        <div class="nums">${nums}</div>${restHint}
        <div class="tenant__actions">
          <button class="btn btn--primary btn--sm" data-open="${t.id}">Als Firma öffnen</button>
          <button class="btn btn--ghost btn--sm" data-num="${t.id}" data-name="${esc(t.name)}">+ Nummer</button>
          <button class="btn btn--ghost btn--sm" data-ind="${t.id}" data-cur="${t.industry}">Branche: ${t.industry === 'restaurant' ? 'Restaurant' : 'Allgemein'}</button>
        </div>
      </div>`;
    }

    function wireTenant(t) {
      const card = document.querySelector(`.tenant[data-id="${t.id}"]`);
      if (!card) return;
      card.querySelector(`[data-open="${t.id}"]`).onclick = () => impersonate(t.id, t.name);
      card.querySelector(`[data-num="${t.id}"]`).onclick = () => openNumDlg(t.id, t.name);
      card.querySelector(`[data-ind="${t.id}"]`).onclick = () => toggleIndustry(t.id, t.industry);
      card.querySelectorAll('[data-unassign]').forEach((a) => {
        a.onclick = async (e) => {
          e.preventDefault();
          if (!confirm('Nummer ' + a.dataset.unassign + ' wirklich von dieser Firma lösen?')) return;
          try { await api('/api/admin/numbers/unassign', { phoneNumber: a.dataset.unassign }); toast('Nummer entfernt'); loadTenants(); }
          catch (err) { toast(err.message, 'err'); }
        };
      });
    }

    // ---- Als Firma öffnen (Impersonation) ----
    async function impersonate(tenantId, name) {
      try {
        const d = await api('/api/admin/impersonate', { tenantId });
        // token_hash im Kunden-Dashboard gegen eine echte Session tauschen.
        const url = 'app.html?imp=' + encodeURIComponent(d.tokenHash) + '&impname=' + encodeURIComponent(name);
        window.open(url, '_blank');
      } catch (e) { toast(e.message, 'err'); }
    }

    // ---- Branche umschalten ----
    async function toggleIndustry(tenantId, cur) {
      const next = cur === 'restaurant' ? 'general' : 'restaurant';
      const msg = next === 'restaurant'
        ? 'Diese Firma auf RESTAURANT umstellen? Tischplan und Reservierung werden freigeschaltet.'
        : 'Diese Firma auf ALLGEMEIN umstellen? Reservierung/Tischplan werden ausgeblendet (Daten bleiben erhalten).';
      if (!confirm(msg)) return;
      try { await api('/api/admin/tenants/industry', { tenantId, industry: next }); toast('Branche geändert'); loadTenants(); }
      catch (e) { toast(e.message, 'err'); }
    }

    // ---- Dialog: neue Firma ----
    const newDlg = $('newDlg');
    $('newBtn').onclick = () => { $('newForm').reset(); $('newErr').textContent = ''; syncRadio(); newDlg.showModal(); };
    $('newCancel').onclick = () => newDlg.close();
    $('nIndustry').addEventListener('change', syncRadio);
    function syncRadio() {
      $('nIndustry').querySelectorAll('label').forEach((l) => l.classList.toggle('sel', l.querySelector('input').checked));
    }
    $('newForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('newErr').textContent = '';
      const btn = $('newSave'); btn.disabled = true; btn.textContent = 'Lege an…';
      try {
        await api('/api/admin/tenants/create', {
          name: $('nName').value.trim(),
          email: $('nEmail').value.trim(),
          password: $('nPass').value,
          industry: $('nIndustry').querySelector('input:checked').value,
        });
        newDlg.close(); toast('Firma angelegt'); loadTenants();
      } catch (err) { $('newErr').textContent = err.message; }
      finally { btn.disabled = false; btn.textContent = 'Firma anlegen'; }
    });

    // ---- Dialog: Nummer zuweisen ----
    const numDlg = $('numDlg'); let numTenant = null;
    function openNumDlg(tenantId, name) { numTenant = tenantId; $('numFor').textContent = 'Für: ' + name; $('numForm').reset(); $('numErr').textContent = ''; numDlg.showModal(); }
    $('numCancel').onclick = () => numDlg.close();
    $('numForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('numErr').textContent = '';
      try {
        await api('/api/admin/numbers/assign', { phoneNumber: $('numVal').value.trim(), tenantId: numTenant, department: $('numDep').value });
        numDlg.close(); toast('Nummer zugewiesen'); loadTenants();
      } catch (err) { $('numErr').textContent = err.message; }
    });

    // ---- Start ----
    sb.auth.getSession().then(({ data }) => { data.session ? enter(data.session) : showLogin(); });
  </script>
</body>
</html>
