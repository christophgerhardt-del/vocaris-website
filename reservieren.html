<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tisch reservieren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:#b8502e; --accent-2:#d98a3d; --ink:#2a2320; --muted:#8a8177; --line:#eae3d7;
    --paper:#fdfcf9; --paper2:#f4efe6; --gold:#c99a4e; --ok:#2f8f63;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%, #efe7d8 0%, #f4efe6 45%, #efe9dd 100%); min-height:100vh; }
  .wrap { max-width:560px; margin:0 auto; padding:40px 18px 64px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:24px; overflow:hidden; box-shadow:0 30px 70px -34px #3d2a1f66, 0 2px 8px -4px #0002; }
  /* Hero */
  .hero { position:relative; padding:34px 30px 30px; color:#fff; text-align:center; overflow:hidden;
    background:linear-gradient(135deg,#3a2820 0%,#7a3d24 55%,#b8502e 100%); }
  .hero::after { content:''; position:absolute; inset:0; background:radial-gradient(600px 200px at 50% -40%, #ffffff33, transparent 70%); pointer-events:none; }
  .eyebrow { font-size:12px; letter-spacing:2.5px; text-transform:uppercase; font-weight:600; color:#ffffffcc; margin-bottom:8px; position:relative; }
  .heroName { font-family:'Instrument Serif',Georgia,serif; font-size:38px; line-height:1.05; letter-spacing:.3px; position:relative; }
  .heroSub { font-size:14px; color:#ffffffcc; margin-top:8px; position:relative; }
  .body { padding:26px 30px 30px; }
  /* Steps */
  .step { display:flex; align-items:center; gap:9px; font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); margin:2px 0 12px; }
  .step .n { width:22px; height:22px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; }
  h1 { font-family:'Instrument Serif',Georgia,serif; font-size:27px; margin:0 0 4px; font-weight:400; }
  .sub { color:var(--muted); margin:0 0 18px; font-size:15px; }
  label { display:block; font-size:12.5px; font-weight:600; margin:14px 0 6px; color:#5f574d; }
  input, select, textarea { width:100%; font:inherit; padding:13px 14px; border:1px solid var(--line); border-radius:13px; background:var(--paper); transition:border-color .15s, box-shadow .15s; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 13%,transparent); }
  .row { display:flex; gap:12px; } .row > * { flex:1; }
  .btn { font:inherit; font-weight:600; padding:13px 18px; border-radius:13px; border:1px solid var(--line); background:#fff; cursor:pointer; transition:transform .06s, box-shadow .15s; }
  .btn:active { transform:scale(.985); }
  .btn--primary { background:linear-gradient(135deg,var(--accent),var(--accent-2)); border:0; color:#fff; width:100%; margin-top:18px; padding:15px; font-size:16px; box-shadow:0 10px 24px -10px var(--accent); }
  .btn--block { width:100%; }
  .btn[disabled] { opacity:.55; cursor:default; }
  .times { display:flex; flex-wrap:wrap; gap:9px; margin-top:12px; }
  .time { padding:10px 16px; border:1.5px solid var(--line); border-radius:12px; background:var(--paper); cursor:pointer; font-weight:600; font-size:15px; transition:all .12s; }
  .time:hover { border-color:var(--accent-2); }
  .time.sel { background:linear-gradient(135deg,var(--accent),var(--accent-2)); border-color:transparent; color:#fff; box-shadow:0 6px 14px -8px var(--accent); }
  .muted { color:var(--muted); font-size:13px; }
  .hint { margin-top:12px; font-size:14px; min-height:1.2em; }
  .ok { color:var(--ok); font-weight:600; } .err { color:var(--accent); font-weight:600; }
  .consent { display:flex; gap:10px; align-items:flex-start; margin-top:16px; font-size:12.5px; color:var(--muted); line-height:1.5; }
  .consent input { width:auto; margin-top:2px; accent-color:var(--accent); }
  .divider { height:1px; background:var(--line); margin:18px 0; border:0; }
  /* Bestätigung */
  .done { text-align:center; padding:14px 0 6px; }
  .checkmark { width:74px; height:74px; border-radius:50%; margin:0 auto 16px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#2f8f63,#57b78a); color:#fff; font-size:38px; box-shadow:0 14px 30px -12px #2f8f63aa; }
  .summary { background:var(--paper2); border-radius:14px; padding:14px 16px; margin-top:14px; text-align:left; font-size:14px; line-height:1.9; }
  .foot { text-align:center; margin-top:18px; font-size:12px; color:var(--muted); }
  .foot a { color:var(--accent); text-decoration:none; font-weight:600; }
  .hidden { display:none; }
  /* Einbett-Modus: nahtlos in die Kunden-Website */
  body.embed { background:transparent; min-height:0; }
  body.embed .wrap { padding:0; max-width:none; }
  body.embed .card { box-shadow:none; border:1px solid var(--line); border-radius:16px; }
  body.embed .foot { display:none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div class="eyebrow">✦ Tischreservierung</div>
        <div id="heroName" class="heroName">Willkommen</div>
        <div id="heroSub" class="heroSub">Reservieren Sie in wenigen Sekunden</div>
      </div>
      <div class="body">
        <div id="loading" class="muted">Lädt …</div>

        <!-- Buchung -->
        <div id="booking" class="hidden">
          <div class="step"><span class="n">1</span> Wann &amp; für wie viele?</div>
          <div class="row">
            <div><label>Datum</label><input id="date" type="date"></div>
            <div><label>Personen</label><input id="party" type="number" min="1" value="2"></div>
          </div>
          <div id="areaWrap" class="hidden">
            <label>Bereich (optional)</label>
            <select id="area"><option value="">Egal – überrascht mich</option></select>
          </div>
          <button id="checkBtn" class="btn btn--block" type="button" style="margin-top:16px">Freie Zeiten anzeigen</button>
          <div id="times" class="times"></div>

          <div id="details" class="hidden">
            <hr class="divider">
            <div class="step"><span class="n">2</span> Ihre Kontaktdaten</div>
            <label>Name</label><input id="name" placeholder="Ihr Name">
            <div class="row">
              <div><label>E-Mail</label><input id="email" type="email" placeholder="für die Bestätigung"></div>
              <div><label>Telefon</label><input id="phone" placeholder="optional"></div>
            </div>
            <label>Besondere Wünsche (optional)</label><textarea id="notes" rows="2" placeholder="z. B. Kinderstuhl, Allergie, Anlass, Fensterplatz"></textarea>
            <label class="consent"><input id="consent" type="checkbox"><span>Ich bin einverstanden, dass meine Angaben zur Bearbeitung der Reservierung gespeichert und verarbeitet werden.</span></label>
            <label class="consent"><input id="newsletter" type="checkbox"><span>Ja, ich möchte gelegentlich Neuigkeiten &amp; Angebote per E-Mail erhalten (jederzeit abbestellbar).</span></label>
            <button id="reserveBtn" class="btn btn--primary" type="button">Jetzt reservieren</button>
          </div>
          <p id="hint" class="hint"></p>

          <!-- Speisekarte (falls hinterlegt) -->
          <div id="menuBlock" class="hidden" style="margin-top:18px;border-top:1px solid rgba(0,0,0,.08);padding-top:14px">
            <button id="menuToggle" type="button" class="btn btn--block" style="background:transparent;border:1px solid rgba(0,0,0,.14)">🍽 Speisekarte ansehen</button>
            <div id="menuText" class="hidden" style="margin-top:12px;max-height:360px;overflow:auto;white-space:pre-wrap;font-size:14px;line-height:1.6;background:rgba(255,255,255,.6);border-radius:12px;padding:14px"></div>
          </div>
        </div>

        <!-- Bestätigung -->
        <div id="confirmed" class="hidden done">
          <div class="checkmark">✓</div>
          <h1>Reserviert!</h1>
          <p id="confirmMsg" class="sub"></p>
          <p id="confirmDetails" style="font-weight:700;margin:8px 0 0"></p>
          <a id="icsBtn" class="btn btn--ghost" style="margin-top:16px;display:none" download="reservierung.ics">📅 Zum Kalender hinzufügen</a>
          <p id="confirmMail" class="muted" style="margin-top:12px;font-size:13px"></p>
        </div>

        <!-- Storno -->
        <div id="storno" class="hidden">
          <h1>Reservierung stornieren</h1>
          <p class="sub">Möchten Sie Ihre Reservierung wirklich absagen?</p>
          <button id="cancelBtn" class="btn btn--primary" type="button">Reservierung stornieren</button>
          <p id="stornoHint" class="hint"></p>
        </div>

        <!-- Verwalten (umbuchen / absagen) -->
        <div id="manage" class="hidden">
          <h1>Ihre Reservierung</h1>
          <p class="sub" id="mgCurrent"></p>
          <div id="mgArea">
            <div class="step"><span class="n">↻</span> Umbuchen</div>
            <div class="row">
              <div><label>Neues Datum</label><input id="mgDate" type="date"></div>
              <div><label>Personen</label><input id="mgParty" type="number" min="1" value="2"></div>
            </div>
            <button id="mgCheck" class="btn btn--block" type="button" style="margin-top:14px">Freie Zeiten anzeigen</button>
            <div id="mgTimes" class="times"></div>
            <button id="mgSave" class="btn btn--primary hidden" type="button">Umbuchung bestätigen</button>
            <p id="mgHint" class="hint"></p>
            <hr class="divider">
            <button id="mgCancel" class="btn btn--block" type="button">Reservierung stornieren</button>
          </div>
        </div>

        <div class="foot">Reservierung über <a href="https://vocaris.eu" target="_blank" rel="noopener">Vocaris</a></div>
      </div>
    </div>
  </div>

<script>
  const API = 'https://ki-anruf.onrender.com';
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const token = params.get('r') || '';
  const storno = params.get('storno') || '';
  const manage = params.get('manage') || '';
  const embed = params.has('embed');
  let selectedTime = '';

  // Einbett-Modus: chromlos + Höhe an die Eltern-Seite melden (Auto-Resize).
  function postHeight() { try { parent.postMessage({ type: 'vocaris:height', token, height: document.body.scrollHeight }, '*'); } catch (e) {} }
  if (embed) {
    document.body.classList.add('embed');
    if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    window.addEventListener('load', postHeight);
    setTimeout(postHeight, 300);
  }

  function show(id) { ['loading','booking','confirmed','storno','manage'].forEach((x) => $(x).classList.toggle('hidden', x !== id)); }

  async function api(path, body) {
    const r = await fetch(API + path, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || 'Es ist ein Fehler aufgetreten.');
    return d;
  }

  async function initBooking() {
    try {
      const info = await api('/api/public/info', { token });
      if (info.name) { $('heroName').textContent = info.name; document.title = 'Tisch reservieren – ' + info.name; }
      $('heroSub').textContent = 'Reservieren Sie in wenigen Sekunden';
      // Bereiche aus der echten Konfiguration des Restaurants (nur mit Tischen).
      const areas = Array.isArray(info.areas) ? info.areas : [];
      const sel = $('area');
      areas.forEach((a) => { const o = document.createElement('option'); o.value = a; o.textContent = a; sel.append(o); });
      // Standard: „Drinnen" (bzw. der Innen-Bereich) vorwählen – Gast kann jederzeit umstellen.
      const def = areas.find((a) => /drinnen|innen|indoor/i.test(a)) || areas[0];
      if (def) sel.value = def;
      $('areaWrap').classList.toggle('hidden', areas.length < 2); // erst ab 2 Bereichen sinnvoll
      $('date').min = new Date().toISOString().slice(0,10);
      $('date').value = new Date().toISOString().slice(0,10);
      // Speisekarte (falls hinterlegt) anbieten.
      if (info.menu && String(info.menu).trim()) {
        $('menuText').textContent = String(info.menu).trim();
        $('menuBlock').classList.remove('hidden');
        $('menuToggle').onclick = () => {
          const t = $('menuText'); const open = t.classList.toggle('hidden');
          $('menuToggle').textContent = open ? '🍽 Speisekarte ansehen' : '🍽 Speisekarte ausblenden';
          postHeight();
        };
      }
      show('booking');
    } catch (e) {
      $('loading').innerHTML = '<p class="err">' + e.message + '</p><p class="muted">Bitte ruf uns für eine Reservierung an.</p>';
    }
  }

  $('checkBtn').onclick = async () => {
    const date = $('date').value, party = Math.max(1, parseInt($('party').value,10) || 2);
    if (!date) { $('hint').textContent = 'Bitte ein Datum wählen.'; return; }
    $('times').innerHTML = '<span class="muted">Suche …</span>'; $('details').classList.add('hidden'); selectedTime = '';
    try {
      const d = await api('/api/public/availability', { token, date, partySize: party });
      if (d.reason === 'group') { $('times').innerHTML = '<span class="muted">Für Gruppen ab ' + ((d.maxParty || party) + 1) + ' Personen nehmen wir die Reservierung gern persönlich am Telefon entgegen. Bitte ruf uns an.</span>'; return; }
      const slots = d.slots || [];
      if (!slots.length) { $('times').innerHTML = '<span class="muted">Keine freien Zeiten an dem Tag. Versuch ein anderes Datum.</span>'; return; }
      $('times').innerHTML = '';
      slots.forEach((s) => {
        const b = document.createElement('button'); b.type='button'; b.className='time'; b.textContent = s.label;
        b.onclick = () => { selectedTime = s.label; document.querySelectorAll('.time').forEach((x) => x.classList.remove('sel')); b.classList.add('sel'); $('details').classList.remove('hidden'); };
        $('times').append(b);
      });
    } catch (e) { $('times').innerHTML = '<span class="err">' + e.message + '</span>'; }
  };

  $('reserveBtn').onclick = async () => {
    if (!selectedTime) { $('hint').textContent = 'Bitte eine Zeit wählen.'; return; }
    const body = { token, date: $('date').value, time: selectedTime, partySize: Math.max(1, parseInt($('party').value,10) || 2),
      name: $('name').value.trim(), email: $('email').value.trim(), phone: $('phone').value.trim(),
      notes: $('notes').value.trim(), area: $('area').value || undefined, consent: $('consent').checked,
      newsletter: $('newsletter').checked };
    if (!body.name) { $('hint').textContent = 'Bitte deinen Namen angeben.'; return; }
    if (!body.email && !body.phone) { $('hint').textContent = 'Bitte E-Mail oder Telefon angeben.'; return; }
    if (!body.consent) { $('hint').textContent = 'Bitte der Speicherung zustimmen.'; return; }
    $('reserveBtn').disabled = true; $('hint').textContent = 'Reserviere …';
    try {
      const d = await api('/api/public/reserve', body);
      if (!d.ok) throw new Error(d.message || 'Reservierung nicht möglich.');
      $('confirmMsg').textContent = d.message || 'Wir freuen uns auf deinen Besuch!';
      // Detail-Zusammenfassung
      const dt = new Date(body.date + 'T' + selectedTime + ':00');
      $('confirmDetails').textContent = dt.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' }) +
        ' · ' + selectedTime + ' Uhr · ' + body.partySize + ' ' + (body.partySize === 1 ? 'Person' : 'Personen');
      // „Zum Kalender hinzufügen" – .ics direkt im Browser erzeugen.
      const pad = (n) => String(n).padStart(2, '0');
      const fmt = (x) => x.getFullYear() + pad(x.getMonth() + 1) + pad(x.getDate()) + 'T' + pad(x.getHours()) + pad(x.getMinutes()) + '00';
      const end = new Date(dt.getTime() + 120 * 60000);
      const rName = ($('heroName').textContent || 'Restaurant').trim();
      const ics = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Vocaris//Reservierung//DE', 'BEGIN:VEVENT',
        'UID:' + Date.now() + '@vocaris.eu', 'DTSTART:' + fmt(dt), 'DTEND:' + fmt(end),
        'SUMMARY:Tischreservierung – ' + rName + ' (' + body.partySize + ' P)', 'END:VEVENT', 'END:VCALENDAR'].join('\r\n');
      const a = $('icsBtn'); a.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics); a.style.display = 'inline-block';
      $('confirmMail').textContent = body.email
        ? '📧 Eine Bestätigung mit allen Details ist an ' + body.email + ' unterwegs.'
        : '';
      show('confirmed');
      postHeight();
    } catch (e) { $('hint').textContent = e.message; $('reserveBtn').disabled = false; }
  };

  $('cancelBtn').onclick = async () => {
    $('cancelBtn').disabled = true; $('stornoHint').textContent = 'Storniere …';
    try { const d = await api('/api/public/cancel', { token: storno }); $('stornoHint').innerHTML = '<span class="ok">' + (d.message || 'Storniert.') + '</span>'; }
    catch (e) { $('stornoHint').innerHTML = '<span class="err">' + e.message + '</span>'; $('cancelBtn').disabled = false; }
  };

  // ---- Verwalten (umbuchen / stornieren) ----
  let mgSelected = '';
  async function initManage() {
    try {
      const r = await api('/api/public/reservation', { token: manage });
      if (r.restaurantName) $('heroName').textContent = r.restaurantName;
      $('heroSub').textContent = 'Reservierung verwalten';
      if (r.status === 'cancelled') { $('mgCurrent').innerHTML = '<span class="err">Diese Reservierung ist storniert.</span>'; $('mgArea').classList.add('hidden'); show('manage'); return; }
      const when = new Date(r.startISO).toLocaleString('de-DE', { weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' });
      $('mgCurrent').textContent = 'Aktuell: ' + when + ' Uhr · ' + r.party + ' ' + (r.party === 1 ? 'Person' : 'Personen');
      $('mgDate').min = new Date().toISOString().slice(0,10);
      $('mgDate').value = r.startISO.slice(0,10);
      $('mgParty').value = r.party;
      show('manage');
    } catch (e) { $('loading').innerHTML = '<p class="err">' + e.message + '</p>'; }
  }
  $('mgCheck') && ($('mgCheck').onclick = async () => {
    const date = $('mgDate').value, party = Math.max(1, parseInt($('mgParty').value,10) || 2);
    if (!date) { $('mgHint').textContent = 'Bitte ein Datum wählen.'; return; }
    $('mgTimes').innerHTML = '<span class="muted">Suche …</span>'; $('mgSave').classList.add('hidden'); mgSelected = '';
    try {
      const d = await api('/api/public/manage-availability', { token: manage, date, partySize: party });
      const slots = d.slots || [];
      if (!slots.length) { $('mgTimes').innerHTML = '<span class="muted">Keine freien Zeiten an dem Tag.</span>'; return; }
      $('mgTimes').innerHTML = '';
      slots.forEach((s) => { const b = document.createElement('button'); b.type='button'; b.className='time'; b.textContent = s.label;
        b.onclick = () => { mgSelected = s.label; document.querySelectorAll('#mgTimes .time').forEach((x)=>x.classList.remove('sel')); b.classList.add('sel'); $('mgSave').classList.remove('hidden'); };
        $('mgTimes').append(b); });
    } catch (e) { $('mgTimes').innerHTML = '<span class="err">' + e.message + '</span>'; }
  });
  $('mgSave') && ($('mgSave').onclick = async () => {
    if (!mgSelected) { $('mgHint').textContent = 'Bitte eine Zeit wählen.'; return; }
    $('mgSave').disabled = true; $('mgHint').textContent = 'Wird umgebucht …';
    try {
      const d = await api('/api/public/change', { token: manage, datum: $('mgDate').value, uhrzeit: mgSelected, personen: Math.max(1, parseInt($('mgParty').value,10) || 2) });
      if (!d.ok) throw new Error(d.message || 'Umbuchen nicht möglich.');
      $('confirmMsg').textContent = d.message || 'Ihre Reservierung wurde geändert.'; show('confirmed');
    } catch (e) { $('mgHint').innerHTML = '<span class="err">' + e.message + '</span>'; $('mgSave').disabled = false; }
  });
  $('mgCancel') && ($('mgCancel').onclick = async () => {
    if (!confirm('Reservierung wirklich stornieren?')) return;
    $('mgCancel').disabled = true; $('mgHint').textContent = 'Storniere …';
    try { const d = await api('/api/public/cancel', { token: manage }); $('mgArea').innerHTML = '<span class="ok">' + (d.message || 'Storniert.') + '</span>'; }
    catch (e) { $('mgHint').innerHTML = '<span class="err">' + e.message + '</span>'; $('mgCancel').disabled = false; }
  });

  if (manage) { initManage(); }
  else if (storno) { $('heroSub').textContent = 'Reservierung stornieren'; show('storno'); }
  else if (token) { initBooking(); }
  else { $('loading').innerHTML = '<p class="err">Ungültiger Link.</p>'; }
</script>
</body>
</html>
